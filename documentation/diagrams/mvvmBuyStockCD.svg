<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1280" height="335"
     viewBox="0 0 1280 335"
     style="background:#FFFFFF;">

  <!-- ═══════════════════════════════════════════════
       LAYER LABELS (subtle background strips)
  ════════════════════════════════════════════════ -->
  <rect x="10"   y="30" width="250" height="10" rx="3" fill="#E8D8FF" opacity="0.6"/>
  <text fill="#9966CC" font-family="sans-serif" font-size="11" font-weight="bold"
        x="135"  y="39" text-anchor="middle">VIEW  (FXML)</text>

  <rect x="270"  y="30" width="345" height="10" rx="3" fill="#C8E8C8" opacity="0.6"/>
  <text fill="#2A7A2A" font-family="sans-serif" font-size="11" font-weight="bold"
        x="442"  y="39" text-anchor="middle">CONTROLLER</text>

  <rect x="625"  y="30" width="370" height="10" rx="3" fill="#FFE4C8" opacity="0.6"/>
  <text fill="#CC7700" font-family="sans-serif" font-size="11" font-weight="bold"
        x="810"  y="39" text-anchor="middle">VIEW MODEL</text>

  <rect x="1005" y="30" width="265" height="10" rx="3" fill="#C8DCF0" opacity="0.6"/>
  <text fill="#1A5A9A" font-family="sans-serif" font-size="11" font-weight="bold"
        x="1137" y="39" text-anchor="middle">SERVICES / MODEL</text>

  <!-- ═══════════════════════════════════════════════
       BuyStockView  «view»  (FXML file)
       x=10, y=50, w=250, h=205
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="10" y="50" width="250" height="205" rx="3" ry="3"
          fill="#F3EAFF" style="stroke:#9966CC;stroke-width:1;"/>
    <!-- V badge -->
    <ellipse cx="76" cy="72" rx="11" ry="11"
             fill="#C9A8EE" style="stroke:#9966CC;stroke-width:1;"/>
    <text fill="#fff" font-family="sans-serif" font-size="11"
          font-weight="bold" x="72" y="77">V</text>
    <text fill="#6633AA" font-family="sans-serif" font-size="12"
          font-style="italic" x="102" y="68">«view»</text>
    <text fill="#222" font-family="sans-serif" font-size="14"
          font-weight="bold" x="55" y="87">BuyStockView.fxml</text>
    <line x1="11" x2="259" y1="96"  y2="96"  style="stroke:#9966CC;stroke-width:0.5;"/>
    <line x1="11" x2="259" y1="104" y2="104" style="stroke:#9966CC;stroke-width:0.5;"/>
    <!-- UI controls -->
    <circle cx="22" cy="117" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="121">symbolLabel: Label</text>
    <circle cx="22" cy="134" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="138">priceLabel: Label</text>
    <circle cx="22" cy="151" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="155">quantitySpinner: Spinner</text>
    <circle cx="22" cy="168" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="172">feeLabel: Label</text>
    <circle cx="22" cy="185" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="189">estimatedCostLabel: Label</text>
    <circle cx="22" cy="202" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="206">statusLabel: Label</text>
    <line x1="11" x2="259" y1="215" y2="215" style="stroke:#9966CC;stroke-width:0.8;"/>
    <!-- buttons -->
    <circle cx="22" cy="228" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="232">[Buy] Button</text>
    <circle cx="22" cy="245" r="3" fill="#9966CC" opacity="0.6"/>
    <text fill="#444" font-family="sans-serif" font-size="13" x="32" y="249">[Cancel] Button</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       BuyStockController  «controller»
       x=270, y=45, w=340, h=235
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="270" y="45" width="340" height="235" rx="3" ry="3"
          fill="#E8F8E8" style="stroke:#2A8A2A;stroke-width:1;"/>
    <ellipse cx="353" cy="67" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="348" y="72">C</text>
    <text fill="#2A7A2A" font-family="sans-serif" font-size="12"
          font-style="italic" x="379" y="63">«controller»</text>
    <text fill="#111" font-family="sans-serif" font-size="14"
          font-weight="bold" x="367" y="81">BuyStockController</text>
    <line x1="271" x2="609" y1="90"  y2="90"  style="stroke:#2A8A2A;stroke-width:0.5;"/>
    <!-- fields -->
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="278" y="99"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="290" y="106">viewModel: BuyStockViewModel</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="278" y="116"/>
    <text fill="#555" font-family="sans-serif" font-size="12"
          font-style="italic" x="290" y="123">@FXML symbolLabel: Label</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="278" y="132"/>
    <text fill="#555" font-family="sans-serif" font-size="12"
          font-style="italic" x="290" y="139">@FXML priceLabel: Label</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="278" y="148"/>
    <text fill="#555" font-family="sans-serif" font-size="12"
          font-style="italic" x="290" y="155">@FXML quantitySpinner: Spinner</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="278" y="164"/>
    <text fill="#555" font-family="sans-serif" font-size="12"
          font-style="italic" x="290" y="171">@FXML estimatedCostLabel: Label</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="278" y="180"/>
    <text fill="#555" font-family="sans-serif" font-size="12"
          font-style="italic" x="290" y="187">@FXML statusLabel: Label</text>
    <!-- methods separator -->
    <line x1="271" x2="609" y1="196" y2="196" style="stroke:#2A8A2A;stroke-width:0.8;"/>
    <!-- methods -->
    <ellipse cx="280" cy="210" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="289" y="214">initialize(): void</text>
    <ellipse cx="280" cy="226" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="289" y="230">setArgument(stockSymbol: String): void</text>
    <ellipse cx="280" cy="242" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="289" y="246">onBuy(): void</text>
    <ellipse cx="280" cy="258" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="289" y="262">onCancel(): void</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       BuyStockViewModel  «viewModel»
       x=625, y=45, w=365, h=270
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="625" y="45" width="365" height="270" rx="3" ry="3"
          fill="#FFF4E8" style="stroke:#CC8800;stroke-width:1;"/>
    <ellipse cx="714" cy="67" rx="11" ry="11"
             fill="#F5C97A" style="stroke:#CC8800;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="709" y="72">C</text>
    <text fill="#AA6600" font-family="sans-serif" font-size="12"
          font-style="italic" x="740" y="63">«viewModel»</text>
    <text fill="#111" font-family="sans-serif" font-size="14"
          font-weight="bold" x="728" y="81">BuyStockViewModel</text>
    <line x1="626" x2="989" y1="90"  y2="90"  style="stroke:#CC8800;stroke-width:0.5;"/>
    <!-- observable property fields -->
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="633" y="99"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="645" y="106">stockSymbol: StringProperty</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="633" y="116"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="645" y="123">currentPrice: ObjectProperty&lt;BigDecimal&gt;</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="633" y="133"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="645" y="140">quantity: IntegerProperty</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="633" y="150"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="645" y="157">estimatedCost: ObjectProperty&lt;BigDecimal&gt;</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="633" y="167"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="645" y="174">fee: ObjectProperty&lt;BigDecimal&gt;</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="633" y="184"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="645" y="191">statusMessage: StringProperty</text>
    <!-- methods separator -->
    <line x1="626" x2="989" y1="200" y2="200" style="stroke:#CC8800;stroke-width:0.8;"/>
    <!-- methods -->
    <ellipse cx="635" cy="214" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="644" y="218">setStockSymbol(symbol: String): void</text>
    <ellipse cx="635" cy="231" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="644" y="235">buy(): boolean</text>
    <line x1="626" x2="989" y1="243" y2="243" style="stroke:#CC8800;stroke-width:0.4;"/>
    <!-- property accessors (smaller / muted) -->
    <ellipse cx="635" cy="254" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#666" font-family="sans-serif" font-size="12" x="644" y="258">stockSymbolProperty(): StringProperty</text>
    <ellipse cx="635" cy="269" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#666" font-family="sans-serif" font-size="12" x="644" y="273">currentPriceProperty(): ObjectProperty</text>
    <ellipse cx="635" cy="284" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#666" font-family="sans-serif" font-size="12" x="644" y="288">estimatedCostProperty(): ObjectProperty</text>
    <ellipse cx="635" cy="299" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#666" font-family="sans-serif" font-size="12" x="644" y="303">feeProperty() / statusMessageProperty()</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       BuySharesService  «service»
       x=1005, y=45, w=260, h=70
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="1005" y="45" width="260" height="70" rx="3" ry="3"
          fill="#E6F3FF" style="stroke:#1A5A9A;stroke-width:1;"/>
    <ellipse cx="1062" cy="64" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="1057" y="69">C</text>
    <text fill="#1A5A9A" font-family="sans-serif" font-size="12"
          font-style="italic" x="1088" y="60">«service»</text>
    <text fill="#111" font-family="sans-serif" font-size="13"
          font-weight="bold" x="1076" y="77">BuySharesService</text>
    <line x1="1006" x2="1264" y1="85" y2="85" style="stroke:#1A5A9A;stroke-width:0.5;"/>
    <ellipse cx="1014" cy="99" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="1023" y="103">buyShares(request): void</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       PortfolioQueryService  «service»
       x=1005, y=135, w=260, h=80
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="1005" y="135" width="260" height="80" rx="3" ry="3"
          fill="#E6F3FF" style="stroke:#1A5A9A;stroke-width:1;"/>
    <ellipse cx="1062" cy="154" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="1057" y="159">C</text>
    <text fill="#1A5A9A" font-family="sans-serif" font-size="12"
          font-style="italic" x="1088" y="150">«service»</text>
    <text fill="#111" font-family="sans-serif" font-size="13"
          font-weight="bold" x="1070" y="167">PortfolioQueryService</text>
    <line x1="1006" x2="1264" y1="175" y2="175" style="stroke:#1A5A9A;stroke-width:0.5;"/>
    <ellipse cx="1014" cy="188" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="1023" y="192">getAvailableStocks(): List</text>
    <ellipse cx="1014" cy="204" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13" x="1023" y="208">getDefaultPortfolioId(): UUID</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       FeeStrategy  «interface»
       x=1005, y=235, w=260, h=70
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="1005" y="235" width="260" height="70" rx="3" ry="3"
          fill="#FFE6E6" style="stroke:#AA2222;stroke-width:1;"/>
    <ellipse cx="1062" cy="254" rx="11" ry="11"
             fill="#B4A7E5" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#fff" font-family="sans-serif" font-size="11"
          font-weight="bold" x="1058" y="259">I</text>
    <text fill="#882222" font-family="sans-serif" font-size="12"
          font-style="italic" x="1088" y="250">«interface»</text>
    <text fill="#111" font-family="sans-serif" font-size="13"
          font-weight="bold" font-style="italic" x="1088" y="267">FeeStrategy</text>
    <line x1="1006" x2="1264" y1="275" y2="275" style="stroke:#AA2222;stroke-width:0.5;"/>
    <ellipse cx="1014" cy="289" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#222" font-family="sans-serif" font-size="13"
          font-style="italic" x="1023" y="293">calculateFee(amount): BigDecimal</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       ARROWS
  ════════════════════════════════════════════════ -->

  <!-- ① View ← Controller: @FXML injection (Controller holds @FXML refs to View) -->
  <!-- Solid line + filled arrowhead pointing LEFT toward View -->
  <path d="M270,148 L260,148" fill="none" style="stroke:#181818;stroke-width:1.5;"/>
  <polygon fill="#181818" points="260,148 271,143 271,153"
           style="stroke:#181818;stroke-width:1;"/>
  <text fill="#555" font-family="sans-serif" font-size="11"
        font-style="italic" x="262" y="143">@FXML</text>

  <!-- ② Controller → ViewModel: delegates / binds (association) -->
  <!-- Solid line + filled arrowhead pointing RIGHT toward ViewModel -->
  <path d="M610,162 L625,162" fill="none" style="stroke:#181818;stroke-width:1.5;"/>
  <polygon fill="#181818" points="625,162 614,157 614,167"
           style="stroke:#181818;stroke-width:1;"/>
  <text fill="#555" font-family="sans-serif" font-size="11"
        font-style="italic" x="613" y="157">delegates</text>

  <!-- ③ Property bindings arc (View ↔ ViewModel, dashed, above diagram) -->
  <!-- Travels from View top-center (135,50) up and over to ViewModel top-center (807,45) -->
  <path d="M135,50 L135,12 L807,12 L807,45"
        fill="none" style="stroke:#9933CC;stroke-width:1.2;stroke-dasharray:6,4;"/>
  <!-- filled arrowhead pointing DOWN at ViewModel top (807,45) -->
  <polygon fill="#9933CC" points="807,45 800,32 814,32"
           style="stroke:#9933CC;stroke-width:1;"/>
  <text fill="#9933CC" font-family="sans-serif" font-size="11"
        font-style="italic" x="471" y="10" text-anchor="middle">«property bindings»</text>

  <!-- ④ ViewModel → BuySharesService -->
  <path d="M990,87 L1005,87" fill="none" style="stroke:#181818;stroke-width:1.2;"/>
  <polygon fill="#181818" points="1005,87 994,82 994,92"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- ⑤ ViewModel → PortfolioQueryService -->
  <path d="M990,175 L1005,175" fill="none" style="stroke:#181818;stroke-width:1.2;"/>
  <polygon fill="#181818" points="1005,175 994,170 994,180"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- ⑥ ViewModel → FeeStrategy -->
  <path d="M990,263 L1005,263" fill="none" style="stroke:#181818;stroke-width:1.2;"/>
  <polygon fill="#181818" points="1005,263 994,258 994,268"
           style="stroke:#181818;stroke-width:1;"/>
  <!-- shared label for ④⑤⑥ -->
  <text fill="#555" font-family="sans-serif" font-size="11"
        font-style="italic" x="994" y="84" text-anchor="middle">uses</text>

</svg>
