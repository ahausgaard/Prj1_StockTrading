<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1220" height="430"
     viewBox="0 0 1220 430"
     style="background:#FFFFFF;">

  <!-- ═══════════════════════════════════════════════
       LiveStock  «context»  (top-left)
       x=20, y=25, w=315, h=150
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="20" y="25" width="315" height="150" rx="2.5" ry="2.5"
          fill="#E6FFE6" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="104" cy="47" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="99" y="52">C</text>
    <text fill="#000" font-family="sans-serif" font-size="12"
          font-style="italic" x="160" y="43">«context»</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-weight="bold" x="120" y="61">LiveStock</text>
    <!-- separator: header / fields -->
    <line x1="21"  x2="334" y1="70"  y2="70"  style="stroke:#181818;stroke-width:0.5;"/>
    <!-- fields -->
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="28" y="79"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="40" y="86">symbol: String</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="28" y="96"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="40" y="103">currentPrice: BigDecimal</text>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="28" y="113"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="40" y="120">currentState: LiveStockState</text>
    <!-- separator: fields / methods -->
    <line x1="21" x2="334" y1="129" y2="129" style="stroke:#181818;stroke-width:1;"/>
    <!-- methods -->
    <ellipse cx="30" cy="143" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="39" y="147">updatePrice(): void</text>
    <ellipse cx="30" cy="160" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="39" y="164">getCurrentState(): LiveStockState</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       LiveStockState  «interface»  (top center-right)
       x=390, y=25, w=425, h=90
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="390" y="25" width="425" height="90" rx="2.5" ry="2.5"
          fill="#FFE6E6" style="stroke:#181818;stroke-width:0.5;"/>
    <!-- purple «I» badge -->
    <ellipse cx="530" cy="47" rx="11" ry="11"
             fill="#B4A7E5" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="526" y="52">I</text>
    <text fill="#000" font-family="sans-serif" font-size="12"
          font-style="italic" x="555" y="43">«interface»</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-style="italic" font-weight="bold" x="567" y="61">LiveStockState</text>
    <!-- separator: header / fields (empty) -->
    <line x1="391" x2="814" y1="70"  y2="70"  style="stroke:#181818;stroke-width:0.5;"/>
    <line x1="391" x2="814" y1="78"  y2="78"  style="stroke:#181818;stroke-width:0.5;"/>
    <!-- methods -->
    <ellipse cx="400" cy="92" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13"
          font-style="italic" x="409" y="96">calculatePriceChange(): BigDecimal</text>
    <ellipse cx="400" cy="109" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13"
          font-style="italic" x="409" y="113">getName(): String</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       BankruptState  (bottom-left)
       x=20, y=285, w=265, h=118
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="20" y="285" width="265" height="118" rx="2.5" ry="2.5"
          fill="#E6F3FF" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="99" cy="307" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="94" y="312">C</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-weight="bold" x="114" y="321">BankruptState</text>
    <line x1="21"  x2="284" y1="330" y2="330" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="30" cy="344" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="39" y="348">calculatePriceChange(): BigDecimal</text>
    <ellipse cx="30" cy="361" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="39" y="365">getName(): String</text>
    <line x1="21" x2="284" y1="373" y2="373" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#888" font-family="sans-serif" font-size="12"
          font-style="italic" x="28" y="391">Price frozen — returns 0%</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       DecliningState  (bottom, 2nd)
       x=300, y=285, w=265, h=118
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="300" y="285" width="265" height="118" rx="2.5" ry="2.5"
          fill="#E6F3FF" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="382" cy="307" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="377" y="312">C</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-weight="bold" x="397" y="321">DecliningState</text>
    <line x1="301" x2="564" y1="330" y2="330" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="310" cy="344" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="319" y="348">calculatePriceChange(): BigDecimal</text>
    <ellipse cx="310" cy="361" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="319" y="365">getName(): String</text>
    <line x1="301" x2="564" y1="373" y2="373" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#888" font-family="sans-serif" font-size="12"
          font-style="italic" x="308" y="391">Price falls −1% to −8%</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       SteadyState  (bottom, 3rd)
       x=580, y=285, w=265, h=118
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="580" y="285" width="265" height="118" rx="2.5" ry="2.5"
          fill="#E6F3FF" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="657" cy="307" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="652" y="312">C</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-weight="bold" x="672" y="321">SteadyState</text>
    <line x1="581" x2="844" y1="330" y2="330" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="590" cy="344" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="599" y="348">calculatePriceChange(): BigDecimal</text>
    <ellipse cx="590" cy="361" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="599" y="365">getName(): String</text>
    <line x1="581" x2="844" y1="373" y2="373" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#888" font-family="sans-serif" font-size="12"
          font-style="italic" x="588" y="391">Price changes ±2%</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       GrowingState  (bottom-right)
       x=860, y=285, w=265, h=118
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="860" y="285" width="265" height="118" rx="2.5" ry="2.5"
          fill="#E6F3FF" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="940" cy="307" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="935" y="312">C</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-weight="bold" x="955" y="321">GrowingState</text>
    <line x1="861" x2="1124" y1="330" y2="330" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="870" cy="344" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="879" y="348">calculatePriceChange(): BigDecimal</text>
    <ellipse cx="870" cy="361" rx="3" ry="3"
             fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="879" y="365">getName(): String</text>
    <line x1="861" x2="1124" y1="373" y2="373" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#888" font-family="sans-serif" font-size="12"
          font-style="italic" x="868" y="391">Price rises +1% to +9%</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       ARROWS
  ════════════════════════════════════════════════ -->

  <!-- LiveStock → LiveStockState (solid, association, "currentState") -->
  <!-- From right of LiveStock (335, 100) → left of LiveStockState (390, 75) -->
  <!-- Right-angle path: across then up -->
  <path d="M335,100 L362,100 L362,75 L384,75"
        fill="none" style="stroke:#181818;stroke-width:1;"/>
  <!-- filled arrowhead pointing right at (390, 75) -->
  <polygon fill="#181818" points="390,75 379,69 379,81"
           style="stroke:#181818;stroke-width:1;"/>
  <text fill="#555" font-family="sans-serif" font-size="12"
        font-style="italic" x="338" y="118">currentState</text>

  <!-- BankruptState → LiveStockState (dashed, realization) -->
  <!-- From BankruptState top-center (152, 285) curving up to interface bottom (450, 130) -->
  <path d="M152,285 C152,210 450,200 450,130"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <!-- open triangle apex at (450, 115), base at y=130 -->
  <polygon fill="none" points="450,115 442,130 458,130"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- DecliningState → LiveStockState (dashed, realization) -->
  <!-- From DecliningState top-center (432, 285) → interface bottom (545, 130) -->
  <path d="M432,285 C432,210 545,200 545,130"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <polygon fill="none" points="545,115 537,130 553,130"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- SteadyState → LiveStockState (dashed, realization) -->
  <!-- From SteadyState top-center (712, 285) → interface bottom (655, 130) -->
  <path d="M712,285 C712,210 655,200 655,130"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <polygon fill="none" points="655,115 647,130 663,130"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- GrowingState → LiveStockState (dashed, realization) -->
  <!-- From GrowingState top-center (992, 285) → interface bottom (760, 130) -->
  <path d="M992,285 C992,210 760,200 760,130"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <polygon fill="none" points="760,115 752,130 768,130"
           style="stroke:#181818;stroke-width:1;"/>

</svg>
