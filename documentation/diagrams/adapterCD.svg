    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="95" y="52">C</text>
    <text fill="#000" font-family="sans-serif" font-size="12"
          font-style="italic" x="119" y="43">«client»</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-weight="bold" x="113" y="62">Logger</text>
    <line x1="16"  x2="279" y1="70"  y2="70"  style="stroke:#181818;stroke-width:0.5;"/>
    <rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="23" y="79"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="35" y="86">output: LogOutput</text>
    <line x1="16"  x2="279" y1="94"  y2="94"  style="stroke:#181818;stroke-width:1;"/>
    <ellipse cx="23" cy="108" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="32" y="112">log(LoggerLevel, String): void</text>
    <ellipse cx="23" cy="125" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="32" y="129">setOutput(LogOutput): void</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       LogOutput  «interface»  (target interface)
       x=310, y=25, w=370, h=110
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="310" y="25" width="370" height="110" rx="2.5" ry="2.5"
