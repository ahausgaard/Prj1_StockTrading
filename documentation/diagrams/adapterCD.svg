<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1410" height="395"
     viewBox="0 0 1410 395"
     font-family="'JetBrains Mono', Consolas, 'Courier New', monospace">

  <rect width="1410" height="395" fill="white"/>

  <!-- Title -->
  <text x="705" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Adapter Pattern</text>

  <!-- ═══════════ ROW 1: LOGGING ═══════════ -->
  <text x="705" y="52" text-anchor="middle" font-size="12" fill="#aaa" font-style="italic">Logging</text>

  <!-- Logger «client» -->
  <rect x="15" y="58" width="185" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
  <text x="107" y="76" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">«client»</text>
  <text x="107" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Logger</text>
  <line x1="15" y1="105" x2="200" y2="105" stroke="#388e3c" stroke-width="1"/>
  <text x="22" y="121" font-size="11" fill="#444">setOutput(out: LogOutput)</text>

  <!-- LogOutput «interface» -->
  <rect x="240" y="58" width="270" height="140" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" rx="4"/>
  <text x="375" y="76" text-anchor="middle" font-size="11" fill="#b71c1c" font-style="italic">«interface»</text>
  <text x="375" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#7f0000">LogOutput</text>
  <line x1="240" y1="105" x2="510" y2="105" stroke="#c62828" stroke-width="1"/>
  <text x="247" y="121" font-size="11" fill="#444">log(level: LoggerLevel, msg: String)</text>
  <text x="247" y="137" font-size="11" fill="#444">log(level, msg, ex: Throwable)</text>

  <!-- FileLogOutputterAdapter «adapter» -->
  <rect x="565" y="58" width="315" height="140" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="722" y="76" text-anchor="middle" font-size="11" fill="#0d47a1" font-style="italic">«adapter»</text>
  <text x="722" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b70">FileLogOutputterAdapter</text>
  <line x1="565" y1="105" x2="880" y2="105" stroke="#1565c0" stroke-width="1"/>
  <text x="572" y="121" font-size="11" fill="#444">implements LogOutput</text>
  <text x="572" y="137" font-size="11" fill="#666">- adaptee: FileLogOutputter</text>

  <!-- FileLogOutputter «adaptee» -->
  <rect x="925" y="58" width="455" height="140" fill="#fff8e1" stroke="#e65100" stroke-width="1.5" rx="4"/>
  <text x="1152" y="76" text-anchor="middle" font-size="11" fill="#bf360c" font-style="italic">«adaptee»</text>
  <text x="1152" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c2900">FileLogOutputter</text>
  <line x1="925" y1="105" x2="1380" y2="105" stroke="#e65100" stroke-width="1"/>
  <text x="932" y="121" font-size="11" fill="#999" font-style="italic">// adapters — DO NOT MODIFY</text>
  <text x="932" y="137" font-size="11" fill="#444">logInfo(msg) / logWarning(msg) / logError(msg)</text>

  <!-- Row 1: uses arrow (→) -->
  <line x1="200" y1="81" x2="228" y2="81" stroke="#444" stroke-width="1.5"/>
  <polygon points="240,81 228,75 228,87" fill="#444"/>
  <text x="220" y="73" text-anchor="middle" font-size="10" fill="#666">uses</text>

  <!-- Row 1: implements arrow (← dashed, hollow triangle at interface) -->
  <line x1="522" y1="81" x2="565" y2="81" stroke="#444" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="510,81 522,75 522,87" fill="white" stroke="#444" stroke-width="1.5"/>
  <text x="537" y="73" text-anchor="middle" font-size="10" fill="#666">implements</text>

  <!-- Row 1: wraps arrow (→) -->
  <line x1="880" y1="81" x2="913" y2="81" stroke="#444" stroke-width="1.5"/>
  <polygon points="925,81 913,75 913,87" fill="#444"/>
  <text x="902" y="73" text-anchor="middle" font-size="10" fill="#666">wraps</text>


  <!-- ═══════════ ROW 2: NOTIFICATIONS ═══════════ -->
  <text x="705" y="228" text-anchor="middle" font-size="12" fill="#aaa" font-style="italic">Notifications</text>

  <!-- Controllers «client» -->
  <rect x="15" y="234" width="185" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
  <text x="107" y="252" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">«client»</text>
  <text x="107" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Controllers</text>
  <line x1="15" y1="281" x2="200" y2="281" stroke="#388e3c" stroke-width="1"/>
  <text x="22" y="297" font-size="11" fill="#444">BuyStockController</text>
  <text x="22" y="313" font-size="11" fill="#444">SellStockController (+2)</text>

  <!-- NotificationService «interface» -->
  <rect x="240" y="234" width="270" height="140" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" rx="4"/>
  <text x="375" y="252" text-anchor="middle" font-size="11" fill="#b71c1c" font-style="italic">«interface»</text>
  <text x="375" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#7f0000">NotificationService</text>
  <line x1="240" y1="281" x2="510" y2="281" stroke="#c62828" stroke-width="1"/>
  <text x="247" y="297" font-size="11" fill="#444">showInfo(title, msg)</text>
  <text x="247" y="313" font-size="11" fill="#444">showWarning(title, msg)</text>
  <text x="247" y="329" font-size="11" fill="#444">showError(title, msg)</text>

  <!-- CustomAlertBoxAdapter «adapter» -->
  <rect x="565" y="234" width="315" height="140" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="722" y="252" text-anchor="middle" font-size="11" fill="#0d47a1" font-style="italic">«adapter»</text>
  <text x="722" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b70">CustomAlertBoxAdapter</text>
  <line x1="565" y1="281" x2="880" y2="281" stroke="#1565c0" stroke-width="1"/>
  <text x="572" y="297" font-size="11" fill="#444">implements NotificationService</text>
  <text x="572" y="313" font-size="11" fill="#666">- adaptee: CustomAlertBox</text>

  <!-- CustomAlertBox «adaptee» -->
  <rect x="925" y="234" width="455" height="140" fill="#fff8e1" stroke="#e65100" stroke-width="1.5" rx="4"/>
  <text x="1152" y="252" text-anchor="middle" font-size="11" fill="#bf360c" font-style="italic">«adaptee»</text>
  <text x="1152" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c2900">CustomAlertBox</text>
  <line x1="925" y1="281" x2="1380" y2="281" stroke="#e65100" stroke-width="1"/>
  <text x="932" y="297" font-size="11" fill="#999" font-style="italic">// adapters — DO NOT MODIFY</text>
  <text x="932" y="313" font-size="11" fill="#444">showAlert(msg, title, type: AlertType)</text>

  <!-- Row 2: uses arrow (→) -->
  <line x1="200" y1="257" x2="228" y2="257" stroke="#444" stroke-width="1.5"/>
  <polygon points="240,257 228,251 228,263" fill="#444"/>
  <text x="220" y="249" text-anchor="middle" font-size="10" fill="#666">uses</text>

  <!-- Row 2: implements arrow (← dashed, hollow triangle at interface) -->
  <line x1="522" y1="257" x2="565" y2="257" stroke="#444" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="510,257 522,251 522,263" fill="white" stroke="#444" stroke-width="1.5"/>
  <text x="537" y="249" text-anchor="middle" font-size="10" fill="#666">implements</text>

  <!-- Row 2: wraps arrow (→) -->
  <line x1="880" y1="257" x2="913" y2="257" stroke="#444" stroke-width="1.5"/>
  <polygon points="925,257 913,251 913,263" fill="#444"/>
  <text x="902" y="249" text-anchor="middle" font-size="10" fill="#666">wraps</text>

</svg>
