<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1410" height="205"
     viewBox="0 0 1410 205"
     style="background:#FFFFFF;">

  <!-- ═══════════════════════════════════════════════
       Logger  «client»  (far left)
       x=15, y=25, w=265, h=135
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="15" y="25" width="265" height="135" rx="2.5" ry="2.5"
          fill="#E6FFE6" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="100" cy="47" rx="11" ry="11"
