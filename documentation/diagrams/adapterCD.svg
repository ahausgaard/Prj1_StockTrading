    <line x1="1131" x2="1394" y1="78"  y2="78"  style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="1138" cy="91" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="1147" y="95">logInfo(String): void</text>
    <ellipse cx="1138" cy="108" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="1147" y="112">logWarning(String): void</text>
    <ellipse cx="1138" cy="125" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="1147" y="129">logError(String): void</text>
    <line x1="1131" x2="1394" y1="138" y2="138" style="stroke:#181818;stroke-width:0.5;"/>
    <text fill="#888" font-family="sans-serif" font-size="11"
          font-style="italic" x="1138" y="153">// loggingLibrary — do not modify</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       ARROWS
  ════════════════════════════════════════════════ -->

  <!-- 1. Logger --[uses]--> LogOutput  (solid + filled arrowhead) -->
  <path d="M280,80 L310,80" fill="none" style="stroke:#181818;stroke-width:1;"/>
  <polygon fill="#181818" points="310,80 298,74 298,86" style="stroke:#181818;stroke-width:1;"/>
  <text fill="#555" font-family="sans-serif" font-size="12" x="282" y="73">uses</text>

  <!-- 2. FileLogOutputterAdapter ---[implements]--> LogOutput  (dashed + open triangle) -->
  <!-- arrow goes FROM Adapter LEFT to LogOutput, open triangle apex at LogOutput right edge -->
  <path d="M715,86 L691,86" fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:6,6;"/>
  <polygon fill="none" points="680,86 691,80 691,92" style="stroke:#181818;stroke-width:1;"/>
  <text fill="#555" font-family="sans-serif" font-size="12" x="674" y="73">implements</text>

  <!-- 3. FileLogOutputterAdapter --[wraps]--> FileLogOutputter  (solid + filled arrowhead) -->
  <path d="M1095,92 L1130,92" fill="none" style="stroke:#181818;stroke-width:1;"/>
  <polygon fill="#181818" points="1130,92 1118,86 1118,98" style="stroke:#181818;stroke-width:1;"/>
  <text fill="#555" font-family="sans-serif" font-size="12" x="1097" y="73">wraps</text>

</svg>
