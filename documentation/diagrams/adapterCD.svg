    <line x1="716" x2="1094" y1="94"  y2="94"  style="stroke:#181818;stroke-width:1;"/>
    <ellipse cx="723" cy="108" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="732" y="112">log(LoggerLevel, String): void</text>
    <ellipse cx="723" cy="125" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13" x="732" y="129">log(LoggerLevel, String, Throwable): void</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       FileLogOutputter  «adaptee»  (far right, library)
       x=1130, y=25, w=265, h=155
  ════════════════════════════════════════════════ -->
  <g>
    <rect x="1130" y="25" width="265" height="155" rx="2.5" ry="2.5"
          fill="#FFFDE6" style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="1180" cy="47" rx="11" ry="11"
             fill="#ADD1B2" style="stroke:#181818;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="1175" y="52">C</text>
    <text fill="#000" font-family="sans-serif" font-size="12"
          font-style="italic" x="1200" y="43">«adaptee»</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
