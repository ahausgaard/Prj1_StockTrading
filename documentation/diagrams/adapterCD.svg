    <text fill="#000" font-family="sans-serif" font-size="11"
          font-weight="bold" x="421" y="52">I</text>
    <text fill="#000" font-family="sans-serif" font-size="12"
          font-style="italic" x="445" y="43">«interface»</text>
    <text fill="#000" font-family="sans-serif" font-size="14"
          font-style="italic" font-weight="bold" x="450" y="62">LogOutput</text>
    <line x1="311" x2="679" y1="70"  y2="70"  style="stroke:#181818;stroke-width:0.5;"/>
    <line x1="311" x2="679" y1="78"  y2="78"  style="stroke:#181818;stroke-width:0.5;"/>
    <ellipse cx="318" cy="91" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13"
