    <ellipse cx="318" cy="108" rx="3" ry="3" fill="#84BE84" style="stroke:#038048;stroke-width:1;"/>
    <text fill="#000" font-family="sans-serif" font-size="13"
          font-style="italic" x="327" y="112">log(LoggerLevel, String, Throwable): void</text>
  </g>

