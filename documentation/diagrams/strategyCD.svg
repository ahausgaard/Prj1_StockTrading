  <!-- ═══════════════════════════════════════════════
       ARROWS
  ════════════════════════════════════════════════ -->

  <!-- BuySharesService → FeeStrategy  (solid line + filled arrowhead, "uses") -->
  <!-- From right of BuySharesService (340, 65) curving to left of FeeStrategy (480, 60) -->
  <path d="M340,65 C410,65 480,60 480,60"
        fill="none" style="stroke:#181818;stroke-width:1;"/>
  <!-- filled arrowhead pointing right at (480,60) -->
  <polygon fill="#181818" points="480,60 468,54 468,66"
           style="stroke:#181818;stroke-width:1;"/>
  <text fill="#000" font-family="sans-serif" font-size="13" x="378" y="55">uses</text>

  <!-- SellSharesService → FeeStrategy  (solid line + filled arrowhead, "uses") -->
  <!-- From left of SellSharesService (1040, 65) curving to right of FeeStrategy (870, 60) -->
  <path d="M1040,65 C970,65 870,60 870,60"
        fill="none" style="stroke:#181818;stroke-width:1;"/>
  <!-- filled arrowhead pointing left at (870,60) -->
  <polygon fill="#181818" points="870,60 882,54 882,66"
           style="stroke:#181818;stroke-width:1;"/>
  <text fill="#000" font-family="sans-serif" font-size="13" x="940" y="55">uses</text>

  <!-- FlatFeeStrategy → FeeStrategy  (dashed + open triangle, realization) -->
  <!-- From top of FlatFeeStrategy center (225, 340) up to FeeStrategy bottom area (590, 113) -->
  <path d="M225,340 C225,230 590,200 590,113"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <!-- open triangle at FeeStrategy bottom (apex at top) -->
  <polygon fill="none" points="590,100 582,116 598,116"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- PercentageFeeStrategy → FeeStrategy  (dashed + open triangle, realization) -->
  <!-- From top of PercentageFeeStrategy center (635, 340) straight up to FeeStrategy bottom (675, 100) -->
  <path d="M635,340 C635,220 675,200 675,113"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <polygon fill="none" points="675,100 667,116 683,116"
           style="stroke:#181818;stroke-width:1;"/>

  <!-- PercentageMinimumFeeStrategy → FeeStrategy  (dashed + open triangle, realization) -->
  <!-- From top of PercentageMin center (1115, 325) up to FeeStrategy bottom (780, 100) -->
  <path d="M1115,325 C1115,210 780,200 780,113"
        fill="none" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/>
  <polygon fill="none" points="780,100 772,116 788,116"
           style="stroke:#181818;stroke-width:1;"/>

</svg>
