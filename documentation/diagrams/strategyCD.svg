    <!-- separator: header / fields -->
    <line x1="481" x2="869" y1="65" y2="65"
          style="stroke:#181818;stroke-width:0.5;"/>
    <!-- separator: fields / methods  (fields section is empty) -->
    <line x1="481" x2="869" y1="73" y2="73"
